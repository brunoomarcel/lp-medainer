name: Deploy LP Medainer


on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-lp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          : "${FTP_HOST:?Missing secret FTP_HOST}"
          : "${FTP_USER:?Missing secret FTP_USER}"
          : "${FTP_PASSWORD:?Missing secret FTP_PASSWORD}"

      - name: Normalize deploy target
        id: target
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL }}
        run: |
          set -euo pipefail

          PROTOCOL="${FTP_PROTOCOL:-}"
          PROTOCOL="$(printf '%s' "$PROTOCOL" | tr '[:upper:]' '[:lower:]')"

          if [ -z "$PROTOCOL" ]; then
            case "$FTP_HOST" in
              ftps://*) PROTOCOL="ftps" ;;
              ftp://*) PROTOCOL="ftp" ;;
              sftp://*) PROTOCOL="sftp" ;;
              *) PROTOCOL="ftp" ;;
            esac
          fi

          if [ "$PROTOCOL" = "sftp" ]; then
            echo "SamKirkland/FTP-Deploy-Action does not support SFTP. Use FTP/FTPS or switch the deploy action."
            exit 1
          fi

          HOST="${FTP_HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST%/}"

          if [ -n "${FTP_PORT:-}" ]; then
            PORT="$FTP_PORT"
          else
            case "$PROTOCOL" in
              ftp) PORT="21" ;;
              ftps) PORT="21" ;;
              *)
                echo "Unsupported FTP_PROTOCOL: $PROTOCOL"
                exit 1
                ;;
            esac
          fi

          REMOTE_PATH="${FTP_PATH:-public_html}"
          REMOTE_PATH="${REMOTE_PATH%/}/"

          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "remote_path=$REMOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.target.outputs.host }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ steps.target.outputs.port }}
          protocol: ${{ steps.target.outputs.protocol }}
          local-dir: dist/
          server-dir: ${{ steps.target.outputs.remote_path }}
          timeout: 120000
          log-level: verbose
