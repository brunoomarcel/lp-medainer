name: Deploy LP Medainer


on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-lp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -euo pipefail
          : "${FTP_HOST:?Missing secret FTP_HOST}"
          : "${FTP_USER:?Missing secret FTP_USER}"
          : "${FTP_PASSWORD:?Missing secret FTP_PASSWORD}"

      - name: Normalize deploy target
        id: target
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          set -euo pipefail

          RAW_TARGET="${FTP_HOST:?Missing secret FTP_HOST}"
          TARGET="$RAW_TARGET"
          PROTOCOL="ftp"

          case "$TARGET" in
            *://*) TARGET="${TARGET#*://}" ;;
          esac

          case "$TARGET" in
            *@*) TARGET="${TARGET#*@}" ;;
          esac

          HOST_PORT="$TARGET"
          PATH_FROM_HOST=""
          case "$TARGET" in
            */*)
              HOST_PORT="${TARGET%%/*}"
              PATH_FROM_HOST="${TARGET#*/}"
              ;;
          esac

          HOST="$HOST_PORT"
          PORT_FROM_HOST=""
          case "$HOST_PORT" in
            *:*)
              HOST="${HOST_PORT%%:*}"
              PORT_FROM_HOST="${HOST_PORT##*:}"
              ;;
          esac

          if [ -n "${FTP_PORT:-}" ]; then
            PORT="$FTP_PORT"
          elif [ -n "$PORT_FROM_HOST" ]; then
            PORT="$PORT_FROM_HOST"
          else
            PORT="21"
          fi

          if [ -z "$HOST" ]; then
            echo "Could not determine FTP host from FTP_HOST"
            exit 1
          fi

          if [ "$PORT" = "990" ]; then
            echo "FTP_PORT=990 indica FTPS implicito, mas este deploy foi configurado para FTP comum."
            echo "Use a porta 21 para FTP ou ajuste a hospedagem para FTPS."
            exit 1
          fi

          REMOTE_PATH="${FTP_PATH:-}"
          if [ -z "$REMOTE_PATH" ] && [ -n "$PATH_FROM_HOST" ]; then
            REMOTE_PATH="$PATH_FROM_HOST"
          fi
          if [ -z "$REMOTE_PATH" ]; then
            REMOTE_PATH="public_html"
          fi
          REMOTE_PATH="${REMOTE_PATH%/}/"

          echo "Deploy target: host=$HOST protocol=$PROTOCOL port=$PORT path=$REMOTE_PATH"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "remote_path=$REMOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.target.outputs.host }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ steps.target.outputs.port }}
          protocol: ${{ steps.target.outputs.protocol }}
          local-dir: dist/
          server-dir: ${{ steps.target.outputs.remote_path }}
          timeout: 120000
          log-level: verbose
